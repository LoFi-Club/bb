<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#07020f">
<title>LoFi Bash Bros</title>
<style>
  :root{ --border-radius-lg:12px; --font-mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace; }
  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; background:#07020f; height:100%; width:100%; overflow:hidden; }
  body{ font-family:var(--font-mono); }
  #wrap{ width:100%; max-width:680px; margin:0 auto; padding:12px; }
  #shell{ width:100%; }

  /* rotate prompt visuals (hidden unless shown by portrait rule) */
  #rotate{ display:none; flex-direction:column; align-items:center; justify-content:center;
    position:fixed; inset:0; text-align:center; color:#f5b8d8; padding:40px;
    background:radial-gradient(circle at 50% 40%, #2d1b4e, #07020f); z-index:50; }
  #rotate .phone{ width:64px; height:110px; border:4px solid #f9d77a; border-radius:12px; position:relative; animation:tilt 1.8s ease-in-out infinite; margin-bottom:28px; }
  #rotate .phone:after{ content:""; position:absolute; left:50%; bottom:8px; width:22px; height:4px; background:#f9d77a; border-radius:2px; transform:translateX(-50%); }
  #rotate h1{ font-size:20px; color:#f9d77a; margin:0 0 10px; letter-spacing:1px; }
  #rotate p{ font-size:14px; color:#c4a5e8; margin:0; line-height:1.5; }
  @keyframes tilt{ 0%,40%{transform:rotate(0)} 60%,100%{transform:rotate(-90deg)} }

  /* TOUCH base */
  @media (hover:none) and (pointer:coarse){
    #wrap{ max-width:none; padding:0; height:100%; }
  }
  /* TOUCH + PORTRAIT: hide game, show rotate prompt */
  @media (hover:none) and (pointer:coarse) and (orientation:portrait){
    #shell{ display:none; }
    #rotate{ display:flex; }
  }
  /* TOUCH + LANDSCAPE: full-bleed game */
  @media (hover:none) and (pointer:coarse) and (orientation:landscape){
    #wrap{ height:100%; }
    #shell{ height:100%; border-radius:0; display:flex; flex-direction:column; }
    #topbar{ display:none; }
    #kbh{ display:none; }
    #walletbar{ display:none; }
    #stage{ flex:1; display:flex; align-items:center; justify-content:center; }
    #stage canvas#cv{ width:auto !important; height:100% !important; max-width:100%; }
  }
</style>
</head>
<body>
<div id="wrap">
<div id="shell" style="background:#0d0420;border-radius:var(--border-radius-lg);overflow:hidden;font-family:var(--font-mono);color:#f5b8d8;">
<div id="topbar" style="padding:10px 14px;background:linear-gradient(90deg,#2d1b4e,#4a1d5c);font-size:12px;display:flex;justify-content:space-between;border-bottom:2px solid #f5b8d8;">
<span style="font-weight:bold;color:#f9d77a;">LOFI BASH BROS</span>
<span id="hud" style="color:#c4a5e8;font-size:10px;">MENU</span>
</div>
<div id="stage" style="position:relative;background:#000;">
<canvas id="cv" width="640" height="400" style="display:block;width:100%;image-rendering:pixelated;cursor:pointer;touch-action:none;"></canvas>
<button id="exit" tabindex="-1" style="position:absolute;top:8px;right:8px;background:rgba(45,27,78,.85);color:#f5b8d8;border:1px solid #6b3fa0;padding:4px 10px;font:11px monospace;cursor:pointer;border-radius:3px;display:none;z-index:5;">EXIT</button>
<button id="back" tabindex="-1" style="position:absolute;top:8px;left:8px;background:rgba(45,27,78,.85);color:#f5b8d8;border:1px solid #6b3fa0;padding:4px 10px;font:11px monospace;cursor:pointer;border-radius:3px;display:none;z-index:5;">BACK</button>
<div id="tp">
<div id="dpad">
<button data-k="a" tabindex="-1" class="tb">L</button>
<button data-k="d" tabindex="-1" class="tb">R</button>
</div>
<button data-k="s" tabindex="-1" id="shieldbtn" class="tb">SHD</button>
<div id="acts">
<button data-k="w" tabindex="-1" class="tb" style="grid-column:2;">JMP</button>
<button data-k="l" tabindex="-1" class="tb" style="grid-column:3;">SPC</button>
<button data-k="j" tabindex="-1" class="tb">JAB</button>
<button data-k="k" tabindex="-1" class="tb">SMS</button>
<button data-k="i" tabindex="-1" class="tb">GRB</button>
</div>
</div></div>
<div id="kbh" style="padding:6px 12px;background:#1a0d2e;font-size:9px;color:#8a6db5;">MENU: W/S move - SPACE select &nbsp;|&nbsp; FIGHT: A/D move - W jump - J jab - K smash - L special - I grab/use - S shield</div>
<div id="walletbar" style="padding:8px 12px;background:#0d0420;display:flex;gap:8px;align-items:center;">
<canvas id="pfp" width="40" height="40" style="background:#3d2562;border:2px solid #f5b8d8;border-radius:4px;image-rendering:pixelated;"></canvas>
<div style="flex:1;font-size:10px;"><div id="nn" style="color:#f5b8d8;">NOT CONNECTED</div><div style="color:#8a6db5;">$LOFI <span id="bal">0.0000</span> · WINS <span id="wins">0</span></div></div>
<button id="rs" tabindex="-1" style="background:#3d2562;color:#8a6db5;border:1px solid #6b3fa0;padding:6px 10px;font-size:10px;cursor:pointer;border-radius:3px;display:none;">RESET</button>
</div>
<style>
.tb{background:rgba(45,27,78,.78);color:#f5b8d8;border:2px solid #6b3fa0;border-radius:50%;font:bold 11px monospace;cursor:pointer;width:54px;height:54px;-webkit-tap-highlight-color:transparent;touch-action:none;user-select:none;-webkit-user-select:none;}
.tb.act{background:rgba(245,184,216,.5);border-color:#f9d77a;}
#tp{display:none;}
#dpad{position:absolute;left:12px;bottom:12px;display:flex;gap:12px;z-index:6;}
#shieldbtn{position:absolute;left:138px;bottom:12px;z-index:6;width:48px;height:48px;font-size:10px;}
#acts{position:absolute;right:12px;bottom:12px;display:grid;grid-template-columns:repeat(3,54px);grid-template-rows:repeat(2,54px);gap:6px;z-index:6;}
@media(hover:hover){#tp{display:none !important;}}
</style>
</div>
<script>
(function(){ if(window.storage) return;
  window.storage={
    async get(k){try{const v=localStorage.getItem(k);return v===null?null:{key:k,value:v};}catch(e){return null;}},
    async set(k,v){try{localStorage.setItem(k,v);return {key:k,value:v};}catch(e){return null;}},
    async delete(k){try{localStorage.removeItem(k);}catch(e){}return{key:k,deleted:true};},
    async list(){return{keys:[]};}
  };
})();
</script>

function uF(f,idx){
  if(f.dead)return;
  if(f.hitstop>0){f.hitstop--;return;}
  if(f.cd>0)f.cd--;if(f.iv>0)f.iv--;if(f.wpAtk>0)f.wpAtk--;if(f.landDust>0)f.landDust--;
  if(f.squash<1)f.squash=Math.min(1,f.squash+0.04);if(f.squash>1)f.squash=Math.max(1,f.squash-0.04);
  let ml=0,mr=0,jp=0,jb=0,sm=0,sp=0,gb=0,sd=0;
  if(idx===0){ml=ks['a'];mr=ks['d'];jp=ks['wp'];jb=ks['jp'];sm=ks['kp'];sp=ks['lp'];gb=ks['ip'];sd=ks['s'];ks['wp']=0;ks['jp']=0;ks['kp']=0;ks['lp']=0;ks['ip']=0;}
  else{
    // AI: target nearest enemy, OR the boss if present
    let tx=null,ty=null,best=Infinity;
    if(boss){tx=boss.x;ty=boss.y;}
    for(let i=0;i<figs.length;i++){if(i===idx||figs[i].dead||figs[i].team===f.team)continue;const d=Math.abs(figs[i].x-f.x)+Math.abs(figs[i].y-f.y)*0.5;if(d<best){best=d;tx=figs[i].x;ty=figs[i].y;}}
    if(tx!==null){
      const ds=tx-f.x,dy=ty-f.y,adx=Math.abs(ds);f.fc=ds>=0?1:-1;
      if(adx>28){if(ds>0)mr=1;else ml=1;}else if(adx<18&&Math.random()<0.3){if(ds>0)ml=1;else mr=1;}
      if(adx<34&&Math.abs(dy)<28&&f.cd===0&&Math.random()<0.18){const r=Math.random();if(f.h&&Math.random()<0.6)gb=1;else if(r<0.2)sm=1;else if(r<0.35)sp=1;else jb=1;}
      if(dy<-25&&f.og&&Math.random()<0.06)jp=1;
      if(f.y>140&&!f.og&&f.jp>0&&Math.random()<0.04)jp=1;
      if(!f.h){for(let i=0;i<itm.length;i++){const it=itm[i];const dx2=Math.abs(it.x-f.x);if(dx2<22&&Math.abs(it.y-f.y)<22){gb=1;break;}else if(dx2<40&&Math.abs(it.y-f.y)<25){if(it.x>f.x)mr=1;else ml=1;}}}
    }
  }
  if(f.st==='hit'){f.sT--;if(f.sT<=0)f.st='idle';}
  else if(f.st==='jab'||f.st==='smash'||f.st==='special'){
    f.sT--;const hf=f.st==='jab'?6:(f.st==='smash'?8:10);
    if(f.sT===hf){
      const rch=f.st==='jab'?22:f.st==='smash'?34:30;
      // hit enemy fighters
      for(let ti=0;ti<figs.length;ti++){if(ti===idx||figs[ti].dead||figs[ti].team===f.team)continue;const tg=figs[ti];if(tg.iv<=0&&!tg.sd){const dx=tg.x-f.x;if(Math.sign(dx)===f.fc&&Math.abs(dx)<rch&&Math.abs(tg.y-f.y)<28){const dm=f.st==='jab'?4:f.st==='smash'?14:9;tg.d+=dm;const kb=f.st==='smash'?(1.6+tg.d*0.05):(0.8+tg.d*0.035);tg.vx=f.fc*kb;tg.vy=-kb*(f.st==='smash'?1.2:0.6);tg.st='hit';tg.sT=14;tg.iv=10;tg.hitstop=f.st==='smash'?5:2;f.hitstop=2;f.st==='smash'?sS():sH();for(let i=0;i<8;i++)prt.push({x:tg.x,y:tg.y-10,vx:f.fc*2,vy:(Math.random()-0.5)*4,l:25,c:[250,200,80],s:2});}}}
      // hit boss (only player team)
      if(boss&&f.team===0){const dx=boss.x-f.x;if(Math.abs(dx)<rch+20&&Math.abs(boss.y-f.y)<40){const dm=f.st==='jab'?3:f.st==='smash'?10:7;boss.hp-=dm;boss.flash=6;f.hitstop=3;sS();for(let i=0;i<10;i++)prt.push({x:boss.x+(Math.random()-0.5)*30,y:boss.y+(Math.random()-0.5)*20,vx:(Math.random()-0.5)*5,vy:(Math.random()-0.5)*5,l:30,c:[250,150,40],s:2});}}
    }
    if(f.sT<=0){f.st='idle';f.cd=12;}
  }
  else if(f.st==='shield'){if(!sd||f.sh<=0){f.st='idle';f.sd=false;f.sh=Math.min(1,f.sh+0.005);}else{f.sd=true;f.sh=Math.max(0,f.sh-0.003);f.vx*=0.5;}}
  else{
    if(sd&&f.og){f.st='shield';f.sd=true;}
    else{
      if(ml){f.vx=-MS_;f.fc=-1;}else if(mr){f.vx=MS_;f.fc=1;}else f.vx*=0.7;
      if(jp&&f.jp>0){f.vy=JV;f.og=false;f.jp--;sJ();f.squash=1.3;}
      if(jb&&f.cd===0){f.st='jab';f.sT=14;}
      if(sm&&f.cd===0){f.st='smash';f.sT=20;f.squash=1.2;}
      if(sp&&f.cd===0){f.st='special';f.sT=22;f.cd=30;dSpc(f,idx);}

function uBoss(){

  if(boss.flash>0)boss.flash--;
  if(boss.shake>0)boss.shake--;
  // phase by hp
  const hpRatio=boss.hp/boss.maxhp;
  boss.phase=hpRatio>0.66?1:hpRatio>0.33?2:3;
  boss.atkT--;
  // gentle hover
  boss.y=70+Math.sin(fN*0.04)*5;
  if(boss.state==='idle'){
    if(boss.atkT<=0){
      // pick an attack; more aggressive in higher phases
      const atks=boss.phase===1?['spread','cassrain']:boss.phase===2?['spread','cassrain','slam','beam']:['spread','cassrain','slam','beam','minions'];
      boss.curAtk=atks[Math.floor(Math.random()*atks.length)];
